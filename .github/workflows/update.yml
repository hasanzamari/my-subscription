name: Smart Country-Boosted Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # هر ۶ ساعت

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Run Core Engine (Download, Parse, Dedup)
        run: python merge.py

      - name: 2. Run Smart Best Generator (Country Boost + No False Pings)
        run: python -m Core.smart_best

      - name: 3. PROOF & STATS
        run: |
          echo "========================================="
          echo "📊 Generated Files:"
          wc -l output/Best*.txt output/best_i.txt || echo "No files found"
          echo "========================================="

      - name: 4. Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Auto Update: Country-Boosted Best Files $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
