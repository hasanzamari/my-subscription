name: Complete Smart Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Run merge.py
        run: python merge.py

      - name: 2. Run Health Checker
        run: python -m Core.health_checker

      - name: 3. Run Smart Best Generator
        run: python -m Core.smart_best

      - name: 4. PROOF (No Duplicates Check)
        run: |
          echo "========================================="
          echo "🔍 بررسی تکراری بودن:"
          python3 << 'EOF'
          import os
          
          files = ['output/Best10.txt', 'output/Best20.txt', 'output/Best50.txt', 
                   'output/Best100.txt', 'output/Best500.txt', 'output/Best1000.txt']
          
          all_configs = set()
          total = 0
          
          for f in files:
              if os.path.exists(f):
                  with open(f, 'r', encoding='utf-8') as file:
                      configs = [line.strip() for line in file if line.strip()]
                      total += len(configs)
                      all_configs.update(configs)
          
          print(f"📊 مجموع کانفیگ‌ها در همه فایل‌ها: {total}")
          print(f"🔍 تعداد کانفیگ‌های یکتا: {len(all_configs)}")
          
          if total == len(all_configs):
              print("✅ هیچ تکراری وجود ندارد!")
          else:
              print(f"⚠️ {total - len(all_configs)} کانفیگ تکراری وجود دارد")
          EOF
          
          echo "========================================="
          echo "📁 خطوط فایل‌ها:"
          wc -l output/Best*.txt
          echo "========================================="
      - name: 5. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Smart Update: $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
