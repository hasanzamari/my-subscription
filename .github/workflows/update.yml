name: Complete Smart Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Run merge.py
        run: python merge.py

      - name: 2. Run Health Checker
        run: python -m Core.health_checker

      - name: 3. Run Smart Best Generator
        run: python -m Core.smart_best

      - name: 4. PROOF (Smart Stats)
        run: |
          echo "========================================="
          echo "📊 آمار کلی سلامت کانفیگ‌ها:"
          python3 << 'EOF'
          import json
          
          with open('database/database.json', 'r', encoding='utf-8') as f:
              db = json.load(f)
          
          tested = [v for v in db.values() if v.get('last_test')]
          total_success = sum(v.get('success', 0) for v in tested)
          total_fail = sum(v.get('fail', 0) for v in tested)
          
          print(f"🔍 تعداد کانفیگ‌های تست شده: {len(tested)}")
          print(f"✅ مجموع موفقیت‌ها: {total_success}")
          print(f"❌ مجموع شکست‌ها: {total_fail}")
          
          if total_success > 0:
              print(f"📈 نرخ موفقیت: {total_success/(total_success+total_fail)*100:.1f}%")
              
              # نمایش ۳ کانفیگ موفق
              successful = [v for v in tested if v.get('success', 0) > 0]
              print(f"\n🏆 نمونه‌های موفق (Top 3):")
              for i, cfg in enumerate(successful[:3]):
                  print(f"  [{i+1}] Success: {cfg.get('success', 0)} | Fail: {cfg.get('fail', 0)} | History: {cfg.get('history', [])[-3:]}")
          else:
              print("⚠️ هنوز هیچ کانفیگ موفقی تست نشده")
          EOF
          
          echo "========================================="
          echo "📁 وضعیت فایل‌های Best:"
          wc -l output/Best*.txt
          echo "========================================="

      - name: 5. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Smart Update: $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
