name: Debug Health & Best

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Create Debug Health Checker
        run: |
          mkdir -p Core
          printf '%s\n' \
          'import json, os, time, socket, re, base64' \
          'from concurrent.futures import ThreadPoolExecutor, as_completed' \
          'from datetime import datetime, timedelta' \
          'from Core.logger import log' \
          'DB_FILE, HEALTH_FILE, WORKERS, TIMEOUT = "database/database.json", "database/config_health.json", 50, 4' \
          'def extract_addr_port(cfg):' \
          '    try:' \
          '        cfg = cfg.strip()' \
          '        if cfg.startswith("vmess://"):' \
          '            data = json.loads(base64.b64decode(cfg[8:]).decode())' \
          '            return data.get("add"), data.get("port")' \
          '        for p in ["vless://", "trojan://", "ss://", "hy2://", "hysteria://", "tuic://"]:' \
          '            if cfg.startswith(p):' \
          '                m = re.search(rf"{re.escape(p)}[^@]+@([^:]+):(\\d+)", cfg)' \
          '                if m: return m.group(1), m.group(2)' \
          '        if cfg.startswith("ssr://"):' \
          '            dec = base64.b64decode(cfg[6:]).decode()' \
          '            parts = dec.split(":")' \
          '            if len(parts) >= 2: return parts[0], parts[1]' \
          '    except: pass' \
          '    return None, None' \
          'def main():' \
          '    if not os.path.exists(DB_FILE): return log("DB not found")' \
          '    with open(DB_FILE, "r", encoding="utf-8") as f: db = json.load(f)' \
          '    log(f"Total configs in DB: {len(db)}")' \
          '    targets = list(db.items())[:10]' \
          '    log("=== DEBUG: Testing first 10 configs ===")' \
          '    for i, (h, info) in enumerate(targets):' \
          '        cfg = info.get("config", "")' \
          '        addr, port = extract_addr_port(cfg)' \
          '        log(f"[{i}] Hash: {h[:16]} | Addr: {addr} | Port: {port}")' \
          '        if addr and port:' \
          '            try:' \
          '                t0 = time.time()' \
          '                sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)' \
          '                sock.settimeout(TIMEOUT)' \
          '                sock.connect((addr, int(port)))' \
          '                sock.close()' \
          '                ms = (time.time() - t0) * 1000' \
          '                log(f"    ✅ SUCCESS: {ms:.1f}ms")' \
          '            except socket.timeout: log(f"    ❌ TIMEOUT")' \
          '            except ConnectionRefusedError: log(f"    ❌ REFUSED")' \
          '            except Exception as e: log(f"    ❌ ERROR: {e}")' \
          '        else:' \
          '            log(f"    ❌ NO ADDR/PORT")' \
          'if __name__ == "__main__": main()' > Core/debug_health.py

      - name: Create Debug Rebuild Script
        run: |
          printf '%s\n' \
          'import json' \
          'from Core.logger import log' \
          'def main():' \
          '    log("=== DEBUG: Testing rebuild_best ===")' \
          '    try:' \
          '        log("Step 1: Loading database...")' \
          '        with open("database/database.json", "r", encoding="utf-8") as f:' \
          '            db = json.load(f)' \
          '        log(f"Step 2: DB loaded. Total: {len(db)} configs")' \
          '        log("Step 3: Importing best_manager...")' \
          '        from Core.best_manager import build_best' \
          '        log("Step 4: Calling build_best()...")' \
          '        best_sets = build_best(db)' \
          '        log(f"Step 5: build_best() returned: {type(best_sets)}")' \
          '        log(f"Step 6: Keys: {best_sets.keys() if isinstance(best_sets, dict) else best_sets}")' \
          '        log("Step 7: Importing exporter...")' \
          '        from Core.exporter import export_best_sets' \
          '        log("Step 8: Calling export_best_sets()...")' \
          '        export_best_sets(best_sets)' \
          '        log("✅ SUCCESS: All steps completed!")' \
          '    except Exception as e:' \
          '        log(f"❌ ERROR: {e}")' \
          '        import traceback' \
          '        traceback.print_exc()' \
          'if __name__ == "__main__": main()' > Core/debug_rebuild.py

      - name: Run Debug Health Check
        run: python -m Core.debug_health

      - name: Run Debug Rebuild
        run: python -m Core.debug_rebuild

      - name: Show Output Folder
        run: |
          echo "=== Contents of output/ folder ==="
          ls -lh output/ || echo "output/ folder not found"
          echo "=== Last modified files ==="
          find output/ -type f -printf '%T@ %p\n' 2>/dev/null | sort -n | tail -5 || echo "No files"
