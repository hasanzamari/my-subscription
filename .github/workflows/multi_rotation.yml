name: Multi-File Rotation (2500 Configs x 3)

on:
  schedule:
    - cron: "0 */6 * * *"  # هر ۶ ساعت (همزمان با update.yml)
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Multi-File Rotation
        run: python -m Core.universal_rotation

      - name: Commit and Push Rotated Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن همه فایل‌های جدید و ایندکس‌ها
          git add -A
          
          git commit -m "🔄 Multi-Rotation: New 3500-config batches at $(date +%H:%M)" || echo "No changes"
          git pull --rebase --autostash origin main || echo "Pull skipped"
          git push origin main
