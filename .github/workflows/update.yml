name: Hybrid Smart Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Requests (Required for Multi-Region API)
        run: pip install requests

      - name: 1. Run merge.py (Gather & Dedup)
        run: python merge.py

      - name: 2. Run Fast Health Checker (TCP for the masses)
        run: python -m Core.health_checker

      - name: 3. Run Smart Best Generator (Standard files: 10 to 5000)
        run: python -m Core.smart_best

      - name: 4. Run Premium Health Checker (Multi-Region for best_i.txt)
        run: python -m Core.premium_checker

      - name: 5. PROOF & STATS
        run: |
          echo "========================================="
          echo "📊 Standard Files:"
          wc -l output/Best*.txt
          echo "========================================="
          echo "👑 Premium File (best_i.txt):"
          wc -l output/best_i.txt
          echo "========================================="

      - name: 6. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Hybrid Update: Fast TCP + Premium Multi-Region (best_i): $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
