name: Smart Complete Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Create SMART Health Checker (Zombie Filter & Priority)
        run: |
          mkdir -p Core
          printf '%s\n' \
          'import json, os, time, socket, base64' \
          'from urllib.parse import urlparse' \
          'from concurrent.futures import ThreadPoolExecutor, as_completed' \
          'from datetime import datetime, timedelta' \
          'from Core.logger import log' \
          'DB_FILE = "database/database.json"' \
          'WORKERS, TIMEOUT, CHUNK = 50, 4, 3000' \
          'def extract_addr_port(cfg):' \
          '    try:' \
          '        cfg = cfg.strip()' \
          '        if cfg.startswith("vmess://"):' \
          '            b64 = cfg[8:] + "=" * ((4 - len(cfg[8:]) % 4) % 4)' \
          '            data = json.loads(base64.b64decode(b64).decode("utf-8", errors="ignore"))' \
          '            return str(data.get("add") or data.get("address")), str(data.get("port"))' \
          '        if "://" in cfg:' \
          '            p = urlparse(cfg)' \
          '            addr, port = p.hostname, p.port' \
          '            if not addr and "@" in p.netloc:' \
          '                parts = p.netloc.split("@")[-1].split(":")' \
          '                if len(parts) == 2: addr, port = parts[0], parts[1]' \
          '            if addr and port: return str(addr), str(port)' \
          '    except: pass' \
          '    return None, None' \
          'def worker(args):' \
          '    h, info = args' \
          '    addr, port = extract_addr_port(info.get("config", ""))' \
          '    if not addr or not port: return h, False, 0' \
          '    try:' \
          '        t0 = time.time()' \
          '        sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)' \
          '        sock.settimeout(TIMEOUT)' \
          '        sock.connect((addr, int(port)))' \
          '        sock.close()' \
          '        return h, True, (time.time() - t0) * 1000' \
          '    except: return h, False, 0' \
          'def main():' \
          '    if not os.path.exists(DB_FILE): return log("DB not found")' \
          '    with open(DB_FILE, "r", encoding="utf-8") as f: db = json.load(f)' \
          '    now = datetime.now()' \
          '    to_test = []' \
          '    debug_count = 0' \
          '    for h, i in db.items():' \
          '        s, f_cnt = i.get("success", 0), i.get("fail", 0)' \
          '        last = i.get("last_test")' \
          '        # فیلتر هوشمند: اگر کانفیگ زامبی است (فقط شکست خورده)، هفته‌ای یکبار تست شود' \
          '        if s == 0 and f_cnt > 5:' \
          '            if last and (now - datetime.fromisoformat(last)).days < 7: continue' \
          '        # در غیر این صورت، اگر بیش از ۲۴ ساعت تست نشده، به لیست اضافه شود' \
          '        if not last or (now - datetime.fromisoformat(last)).total_seconds() > 86400:' \
          '            to_test.append((h, i))' \
          '            if debug_count < 3:' \
          '                addr, port = extract_addr_port(i.get("config", ""))' \
          '                log(f"[DEBUG] Extracted: {addr}:{port}")' \
          '                debug_count += 1' \
          '    targets = to_test[:CHUNK]' \
          '    log(f"Smart Filter: {len(to_test)} need testing. Running {len(targets)}...")' \
          '    ok_cnt, fail_cnt = 0, 0' \
          '    with ThreadPoolExecutor(max_workers=WORKERS) as ex:' \
          '        for f in as_completed({ex.submit(worker, t): t[0] for t in targets}):' \
          '            h, ok, ms = f.result()' \
          '            db[h]["last_test"] = datetime.now().isoformat()' \
          '            hist = db[h].get("history", [])' \
          '            if ok:' \
          '                ok_cnt += 1' \
          '                db[h]["success"] = db[h].get("success", 0) + 1' \
          '                hist.append(ms)' \
          '            else:' \
          '                fail_cnt += 1' \
          '                db[h]["fail"] = db[h].get("fail", 0) + 1' \
          '                hist.append(9999)' \
          '            if len(hist) > 30: hist = hist[-30:]' \
          '            db[h]["history"] = hist' \
          '    log(f"Done: {ok_cnt} OK, {fail_cnt} FAIL")' \
          '    with open(DB_FILE, "w", encoding="utf-8") as f: json.dump(db, f, indent=2, ensure_ascii=False)' \
          'if __name__ == "__main__": main()' > Core/health_checker.py

      - name: 2. Run SMART Health Check FIRST (Before merge adds junk)
        run: python -m Core.health_checker

      - name: 3. Run merge.py (Collect new configs & deduplicate)
        run: python merge.py

      - name: 4. Create Force Best Generator
        run: |
          printf '%s\n' \
          'import json, os' \
          'from Core.logger import log' \
          'def calc_score(info):' \
          '    s, f = info.get("success", 0), info.get("fail", 0)' \
          '    hist = info.get("history", [])' \
          '    total = s + f' \
          '    if total == 0: return 0' \
          '    score = (s / total) * 500' \
          '    valid_hist = [x for x in hist if x < 9000]' \
          '    if valid_hist:' \
          '        median = sorted(valid_hist)[len(valid_hist)//2]' \
          '        score += max(0, 300 - median)' \
          '    score += min(total, 20) * 10' \
          '    return round(score, 2)' \
          'def main():' \
          '    log("Loading DB...")' \
          '    with open("database/database.json", "r", encoding="utf-8") as f: db = json.load(f)' \
          '    log("Calculating scores...")' \
          '    for h, info in db.items():' \
          '        db[h]["score"] = calc_score(info)' \
          '    log("Sorting...")' \
          '    sorted_cfgs = sorted(db.values(), key=lambda x: x.get("score", 0), reverse=True)' \
          '    os.makedirs("output", exist_ok=True)' \
          '    for limit in [10, 20, 50, 100, 500, 1000]:' \
          '        path = f"output/Best{limit}.txt"' \
          '        with open(path, "w", encoding="utf-8") as f:' \
          '            for cfg in sorted_cfgs[:limit]:' \
          '                f.write(cfg.get("config", "") + "\n")' \
          '        log(f"✅ Wrote {path} ({min(limit, len(sorted_cfgs))} configs)")' \
          'if __name__ == "__main__": main()' > Core/force_best.py

      - name: 5. Generate Best Files
        run: python -m Core.force_best

      - name: 6. PROOF & STATS
        run: |
          echo "========================================="
          echo "🔍 بررسی آدرس‌های استخراج شده و آمار:"
          python3 -c "
          import json
          with open('database/database.json', 'r', encoding='utf-8') as f:
              db = json.load(f)
          sample = list(db.values())[0]
          print('  ✅ Success:', sample.get('success', 0))
          print('  ❌ Fail:', sample.get('fail', 0))
          print('  📜 History (last 5):', sample.get('history', [])[-5:])
          print('  🏆 Score:', sample.get('score', 0))
          "
          echo "📁 Lines in Best100.txt:"
          wc -l output/Best100.txt
          echo "========================================="

      - name: 7. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Smart Update (Zombie Filter & Reordered): $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
