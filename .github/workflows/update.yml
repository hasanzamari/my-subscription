name: Advanced Smart Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # هر 6 ساعت سر ساعت

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      
    steps:
      - uses: actions/checkout@v3
      - name: Install Requests
        run: pip install requests
      - name: 1. Run Core Engine
        run: python merge.py
      - name: 2. Run Smart Best Generator
        run: python -m Core.smart_best
      - name: 3. Convert to Modern Formats
        run: python -m Core.format_converter
      - name: 4. Generate Emergency Warp File
        run: python -m Core.warp_manager
      - name: 5. Send Telegram Notification
        run: |
          python3 << 'EOF'
          import json, os
          from Core import notifier
          DB_FILE = "database/database.json"
          SOURCES_FILE = "Sources/sources.txt"
          db = json.load(open(DB_FILE, "r", encoding="utf-8")) if os.path.exists(DB_FILE) else {}
          sources_count = len([l for l in open(SOURCES_FILE, "r", encoding="utf-8") if l.strip() and not l.startswith('#')]) if os.path.exists(SOURCES_FILE) else 0
          notifier.check_health(db, sources_count, len(db))
          EOF
      - name: 6. Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Main Update $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
