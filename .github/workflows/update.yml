name: Advanced Smart Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - uses: actions/checkout@v3

      - name: 1. Run Core Engine (Smart Cache + Fingerprint Dedup)
        run: python merge.py

      - name: 2. Rotate 500 Good Configs from best_iran.txt
        run: python -m Core.rotation_manager

      - name: 3. Run Advanced Smart Best Generator
        run: python -m Core.smart_best

      - name: 4. Convert to Modern Formats (Clash Meta / Sing-Box)
        run: python -m Core.format_converter

      - name: 5. PROOF & STATS
        run: |
          echo "========================================="
          echo "🔄 Rotation File:"
          wc -l output/rotation_500.txt || echo "Not found"
          echo "========================================="
          echo "📊 Generated Text Files:"
          wc -l output/Best*.txt output/best_*.txt output/best_i.txt output/subscription_base64.txt || echo "No txt files"
          echo "========================================="
          echo "📱 Generated Modern Formats:"
          ls -lh output/clash_meta.yaml output/singbox.json || echo "No modern formats"
          echo "========================================="

      - name: 6. Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Update: Rotated 500 configs + Standard Update $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
